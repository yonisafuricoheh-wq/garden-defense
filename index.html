<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2a3d1e">
<title>הגן הקטן</title>
<style>
  :root{ --gold:#ffce4a; --ui:rgba(24,38,18,.86); }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    font-family:'Varela Round','Segoe UI',system-ui,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#12200a;touch-action:none;}
  canvas#game{touch-action:none;}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0e1a08;}
  #stage{position:relative;width:100%;height:100%;max-width:560px;margin:0 auto;overflow:hidden;}
  canvas#game{display:block;width:100%;height:100%;}

  #hud{position:absolute;top:0;left:0;right:0;z-index:5;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:calc(8px + env(safe-area-inset-top)) 12px 0;}
  .chip{background:var(--ui);color:#fff;border-radius:16px;padding:6px 12px;font-weight:700;
    font-size:15px;display:flex;align-items:center;gap:6px;box-shadow:0 3px 8px rgba(0,0,0,.4);
    backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.08);}
  #hearts{gap:2px;padding:6px 10px;}
  .heart{font-size:17px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));transition:transform .2s;}
  .heart.gone{filter:grayscale(1) brightness(.5);transform:scale(.8);opacity:.5;}
  #sunChip .v{color:var(--gold);min-width:30px;text-align:center;}
  #lvlChip{background:rgba(70,45,95,.86);}
  #sunChip .ic{animation:spin 8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #prog{position:absolute;top:calc(46px + env(safe-area-inset-top));left:14px;right:14px;height:7px;z-index:5;
    background:rgba(0,0,0,.4);border-radius:6px;overflow:hidden;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  #progFill{height:100%;width:0;background:linear-gradient(90deg,#ff8f5b,#ffd24a);transition:width .3s;}
  #progFlag{position:absolute;right:0;top:-3px;font-size:12px;}

  #bar{position:absolute;bottom:0;left:0;right:0;z-index:5;display:flex;gap:6px;align-items:flex-end;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));overflow-x:auto;overflow-y:hidden;
    touch-action:pan-x;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
    background:linear-gradient(180deg,rgba(14,26,8,0),rgba(14,26,8,.8) 55%);scrollbar-width:none;}
  #bar::-webkit-scrollbar{display:none;}
  .card{position:relative;flex:0 0 auto;width:62px;height:84px;border-radius:13px;
    background:linear-gradient(180deg,#38512180,#1c2e0e);border:2px solid #52712f;
    display:flex;flex-direction:column;align-items:center;padding-top:2px;cursor:pointer;
    box-shadow:0 4px 9px rgba(0,0,0,.45);transition:transform .1s,border-color .15s;}
  .card:active{transform:scale(.93);}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 5px 12px rgba(0,0,0,.5);transform:translateY(-4px);}
  .card.poor{opacity:.45;}
  .card canvas{width:46px;height:46px;pointer-events:none;}
  .card .nm{font-size:10px;color:#dcefc6;font-weight:700;margin-top:-2px;}
  .card .co{font-size:11.5px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:1px;}
  #shovel{flex:0 0 auto;width:54px;height:84px;border-radius:13px;border:2px solid #6a5030;cursor:pointer;
    background:linear-gradient(180deg,#5a4022,#3a2814);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;color:#f0d8b0;font-size:11px;font-weight:700;box-shadow:0 4px 9px rgba(0,0,0,.45);}
  #shovel .em{font-size:24px;}
  #shovel:active{transform:scale(.93);}
  #shovel.on{border-color:#ff6b5b;box-shadow:0 0 0 2px #ff6b5b,0 4px 9px rgba(0,0,0,.5);}

  #ov{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;text-align:center;padding:22px;color:#fff;
    background:radial-gradient(circle at 50% 34%,rgba(20,40,14,.42),rgba(6,14,4,.72));
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
  #ov .sub,#ov h1{text-shadow:0 2px 6px rgba(0,0,0,.7),0 1px 0 rgba(0,0,0,.4);}
  #ov .panel{background:rgba(10,20,6,.55);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;
    padding:18px 22px;display:flex;flex-direction:column;align-items:center;gap:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);backdrop-filter:blur(3px);}
  #ov.hidden{display:none;}
  #ov h1{font-size:34px;text-shadow:0 3px 0 rgba(0,0,0,.35),0 0 24px rgba(120,220,90,.4);letter-spacing:1px;}
  #ov .sub{font-size:15px;opacity:.92;line-height:1.5;max-width:340px;}
  #ov .best{color:var(--gold);font-weight:800;font-size:17px;}
  .btn{background:linear-gradient(180deg,#ffe06a,#f2a327);color:#3a2600;border:none;border-radius:20px;
    padding:13px 40px;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #b9760f,0 10px 16px rgba(0,0,0,.45);}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b9760f;}
  .btn.sec{background:linear-gradient(180deg,#9fd06a,#5a9a34);box-shadow:0 6px 0 #3f6a1f,0 10px 16px rgba(0,0,0,.4);color:#183008;font-size:17px;padding:11px 30px;}
  .btn.sec:active{box-shadow:0 2px 0 #3f6a1f;}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

  /* level map */
  #mapWrap{width:100%;max-width:420px;height:60vh;overflow-y:auto;overflow-x:hidden;padding:6px 4px;
    touch-action:pan-y;-webkit-overflow-scrolling:touch;
    background:rgba(0,0,0,.25);border-radius:16px;border:1.5px solid rgba(255,255,255,.08);}
  #mapWrap::-webkit-scrollbar{width:6px;} #mapWrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px;}
  #mapGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:6px;}
  .lvl{position:relative;aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:800;cursor:pointer;border:2px solid;}
  .lvl.done{background:linear-gradient(180deg,#7fc24a,#4f8a2a);border-color:#9fe06a;color:#123008;}
  .lvl.open{background:linear-gradient(180deg,#ffd95e,#f0a828);border-color:#fff0b0;color:#3a2600;
    animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
  .lvl.lock{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.3);cursor:default;}
  .lvl .boss{position:absolute;top:-6px;right:-4px;font-size:13px;}

  #ctrl{position:absolute;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:8px;}
  .cbtn{width:36px;height:36px;border-radius:11px;background:var(--ui);border:1.5px solid rgba(255,255,255,.1);
    color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 7px rgba(0,0,0,.4);}
  .cbtn:active{transform:scale(.9);}
  #toast{position:absolute;top:100px;left:50%;transform:translateX(-50%);z-index:8;background:rgba(0,0,0,.72);
    color:#fff;padding:7px 16px;border-radius:14px;font-weight:700;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:80%;text-align:center;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:360px;}
  .legend .li{display:flex;flex-direction:column;align-items:center;font-size:10px;opacity:.85;width:56px;}
  .legend canvas{width:42px;height:42px;}
</style>
</head>
<body>
<div id="app"><div id="stage">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="chip" id="hearts"></div>
    <div class="chip" id="lvlChip">🏵️ שלב <span id="lvlN">1</span></div>
    <div class="chip" id="sunChip"><span class="ic">☀️</span><span class="v" id="sunN">100</span></div>
  </div>
  <div id="prog"><div id="progFill"></div><div id="progFlag">🚩</div></div>
  <div id="ctrl"><div class="cbtn" id="pauseBtn">⏸</div><div class="cbtn" id="speedBtn">1×</div><div class="cbtn" id="mapBtn">🗺️</div></div>
  <div id="toast"></div>
  <div id="bar"></div>

  <div id="ov"></div>
</div></div>

<script>
"use strict";
/* ==========================================================================
   הגן הקטן — GARDEN DEFENSE  ·  100-level campaign edition
   Single-file HTML5 canvas tower-defense. Mobile-first, RTL.
   Data-driven: add a defender/enemy/level rule without touching the loop.
   ========================================================================== */

/* --------------------------------------------------------------------------
   DEFENDERS (15).  role: producer | melee | ranged.
   proj:null => instant/melee hit.  splash:cells => AoE.  air:true => hits flyers.
   -------------------------------------------------------------------------- */
const DEFENDERS = {
  snail:   {name:'שבלול', cost:50, hp:160, role:'producer', produce:25, every:6, tint:'#e0a878'},
  hedgehog:{name:'קיפוד', cost:75, hp:340, role:'melee', range:1.3, dmg:20, rate:1.1, tint:'#7d5f3e'},
  frog:    {name:'צפרדע', cost:100,hp:170, role:'ranged',range:3.3, dmg:24, rate:1.05,proj:'tongue', tint:'#5bbb4a'},
  bee:     {name:'דבורה', cost:100,hp:90,  role:'ranged',range:3.0, dmg:12, rate:2.3, proj:'sting', air:true, tint:'#ffce4a'},
  rabbit:  {name:'ארנב',  cost:75, hp:150, role:'melee', range:1.25,dmg:11, rate:2.4, tint:'#f0e5da'},
  bird:    {name:'ציפור', cost:150,hp:140, role:'ranged',range:3.6, dmg:20, rate:1.5, proj:'seed', air:true, tint:'#4aa3e0'},
  squirrel:{name:'סנאי',  cost:150,hp:170, role:'ranged',range:3.0, dmg:22, rate:1.1, proj:'acorn', splash:0.9, tint:'#b07a45'},
  mouse:   {name:'עכבר',  cost:25, hp:100, role:'producer', produce:15, every:5, tint:'#9aa0a8'},
  turtle:  {name:'צב',    cost:125,hp:1100,role:'melee', range:1.05,dmg:9,  rate:1.7, tint:'#5a8a4a'},
  fox:     {name:'שועל',  cost:200,hp:170, role:'ranged',range:4.6, dmg:58, rate:0.62,proj:'dart', air:true, tint:'#e0692a'},
  owl:     {name:'ינשוף', cost:175,hp:160, role:'ranged',range:3.9, dmg:30, rate:1.25,proj:'feather', air:true, pierce:true, tint:'#8a6a44'},
  cat:     {name:'חתול',  cost:125,hp:280, role:'melee', range:1.4, dmg:30, rate:1.3, tint:'#9aa0aa'},
  mole:    {name:'חפרפרת',cost:150,hp:220, role:'ranged',range:1.7, dmg:26, rate:1.4, proj:null, splash:1.0, tint:'#4a3a48'},
  bear:    {name:'דוב',   cost:300,hp:650, role:'melee', range:1.5, dmg:55, rate:1.0, tint:'#8a5f3a'},
  raccoon: {name:'ראקון', cost:125,hp:200, role:'ranged',range:2.9, dmg:20, rate:1.4, proj:'coin', bonus:8, tint:'#9aa0a8'},
};
// unlock schedule: reaching a level makes these available
const DEF_UNLOCK = {1:['snail','hedgehog'],2:['frog'],3:['bee'],4:['rabbit'],5:['bird'],
  6:['squirrel'],7:['mouse'],8:['turtle'],9:['fox'],10:['owl'],11:['cat'],12:['mole'],13:['bear'],14:['raccoon']};

/* --------------------------------------------------------------------------
   ENEMIES (8).  bite = dps to a defender it's eating.
   -------------------------------------------------------------------------- */
const ENEMIES = {
  ant:        {name:'נמלה',    hp:34,  speed:.5,  bite:8,  dmg:1, reward:12, air:false, size:15, tint:'#7a3b1e'},
  caterpillar:{name:'זחל',     hp:110, speed:.3,  bite:12, dmg:1, reward:20, air:false, size:20, tint:'#8ec04a'},
  beetle:     {name:'חיפושית', hp:200, speed:.33, bite:16, dmg:2, reward:30, air:false, size:19, tint:'#4e6136', armor:.25},
  fly:        {name:'זבוב',    hp:28,  speed:.82, bite:6,  dmg:1, reward:16, air:true,  size:13, tint:'#8891a0'},
  moth:       {name:'פרפר',    hp:70,  speed:.58, bite:8,  dmg:1, reward:22, air:true,  size:17, tint:'#d98cc0'},
  wasp:       {name:'צרעה',    hp:110, speed:.7,  bite:14, dmg:2, reward:28, air:true,  size:16, tint:'#f0c020'},
  spider:     {name:'עכביש',   hp:520, speed:.3,  bite:22, dmg:3, reward:120,air:false, size:32, tint:'#3a2038', mini:true},
  queen:      {name:'מלכת החרקים', hp:1700, speed:.24, bite:40, dmg:5, reward:320, air:false, size:40, tint:'#5a2a5a', armor:.3, boss:true},
};

const SYNERGIES = [
  {a:'frog',b:'bird',dmg:1.25}, {a:'bee',b:'owl',dmg:1.25}, {a:'hedgehog',b:'turtle',dmg:1.2},
  {a:'cat',b:'bear',dmg:1.2}, {a:'snail',b:'mouse',prod:1.3}, {a:'fox',b:'squirrel',dmg:1.2},
];

/* Weather removed (Milestone 1). */

/* ==========================================================================
   STATE
   ========================================================================== */
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
const DPR=Math.min(window.devicePixelRatio||1,2);
const COLS=8, ROWS=5;
let cell=60, boardX=0, boardY=0, boardW=0, boardH=0, viewW=0, viewH=0;
const MAX_LEVEL=100;
const ENEMY_SPEED=0.65;   // global crawl/flight speed multiplier (~35% slower, calm pacing)

const G={
  phase:'menu', level:1, hp:5, maxHp:5, sun:100, speed:1,
  defenders:[], enemies:[], projectiles:[], particles:[], floats:[],
  selected:null, sellMode:false,
  spawnQueue:[], spawnT:0, prepT:0, spawning:false, levelTotal:0,
  ambientT:0,
  shake:0, time:0, biome:0,
};

/* ---------- progress persistence ---------- */
function progress(){ try{return Math.max(1,+(localStorage.getItem('gd_progress')||1));}catch(e){return 1;} }
function saveProgress(n){ try{localStorage.setItem('gd_progress',Math.min(MAX_LEVEL,Math.max(n,progress())));}catch(e){} }
function unlockedDefs(level){ const s=[]; for(let k=1;k<=level;k++) if(DEF_UNLOCK[k]) s.push(...DEF_UNLOCK[k]); return s; }

/* ---------- layout ---------- */
function resize(){
  const r=document.getElementById('stage').getBoundingClientRect();
  viewW=r.width; viewH=r.height;
  canvas.width=viewW*DPR; canvas.height=viewH*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  cell=Math.floor(Math.min((viewW-14)/COLS,(viewH-176)/ROWS));
  boardW=cell*COLS; boardH=cell*ROWS;
  boardX=Math.round((viewW-boardW)/2); boardY=Math.round((viewH-boardH)/2)+8;
}
window.addEventListener('resize',resize);
const cellCX=c=>boardX+(c+.5)*cell, cellCY=r=>boardY+(r+.5)*cell;
function pointToCell(px,py){const c=Math.floor((px-boardX)/cell),r=Math.floor((py-boardY)/cell);
  return (c<0||c>=COLS||r<0||r>=ROWS)?null:{c,r};}
const defAt=(c,r)=>G.defenders.find(d=>d.c===c&&d.r===r&&d.alive);

/* ==========================================================================
   ART HELPERS
   ========================================================================== */
function sphere(g,x,y,r,l,d){const gr=g.createRadialGradient(x-r*.35,y-r*.4,r*.1,x,y,r*1.05);
  gr.addColorStop(0,l);gr.addColorStop(1,d);g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,6.2832);g.fill();}
function blob(g,x,y,rx,ry,l,d){const gr=g.createLinearGradient(x,y-ry,x,y+ry);
  gr.addColorStop(0,l);gr.addColorStop(1,d);g.fillStyle=gr;g.beginPath();g.ellipse(x,y,rx,ry,0,0,6.2832);g.fill();}
function outline(g,w,c){g.lineJoin='round';g.lineWidth=w;g.strokeStyle=c;g.stroke();}
function eye(g,x,y,r,look=0){g.fillStyle='#fff';g.beginPath();g.arc(x,y,r,0,6.2832);g.fill();
  g.fillStyle='#2b2530';g.beginPath();g.arc(x+look*r*.4,y+r*.12,r*.62,0,6.2832);g.fill();
  g.fillStyle='rgba(255,255,255,.9)';g.beginPath();g.arc(x-r*.25,y-r*.3,r*.28,0,6.2832);g.fill();}
const OL='rgba(40,26,14,.55)';

/* ---------- DEFENDER ART ---------- */
function aSnail(g,s,t){const bob=Math.sin(t*2)*s*.04;g.save();g.translate(0,bob);
  g.beginPath();g.moveTo(-s*1.05,s*.55);g.quadraticCurveTo(-s*1.15,s*.05,-s*.75,-s*.02);
  g.quadraticCurveTo(-s*.2,s*.05,s*.5,s*.2);g.quadraticCurveTo(s*1.0,s*.35,s*.85,s*.6);g.closePath();
  g.fillStyle='#e7b487';g.fill();outline(g,s*.09,OL);
  sphere(g,-s*.9,s*.15,s*.34,'#f0c79c','#d99f6f');
  g.strokeStyle='#e7b487';g.lineWidth=s*.11;g.lineCap='round';
  g.beginPath();g.moveTo(-s*.98,-s*.05);g.lineTo(-s*1.05,-s*.6);g.stroke();
  g.beginPath();g.moveTo(-s*.78,-s*.05);g.lineTo(-s*.72,-s*.62);g.stroke();
  eye(g,-s*1.05,-s*.66,s*.13,-.4);eye(g,-s*.72,-s*.68,s*.13,-.4);
  sphere(g,s*.2,-s*.12,s*.72,'#e79a55','#b5651f');
  g.save();g.beginPath();g.arc(s*.2,-s*.12,s*.72,0,6.2832);g.clip();
  g.strokeStyle='rgba(120,60,15,.55)';g.lineWidth=s*.13;g.lineCap='round';
  g.beginPath();for(let a=0;a<9;a+=.16){const rr=s*.66*(1-a/11);g.lineTo(s*.2+Math.cos(a)*rr,-s*.12+Math.sin(a)*rr);}g.stroke();g.restore();
  g.beginPath();g.arc(s*.2,-s*.12,s*.72,0,6.2832);outline(g,s*.09,OL);g.restore();}
function aHedgehog(g,s,t,atk){const lu=atk?Math.sin(atk*7)*s*.12:0;g.save();g.translate(-lu,0);
  for(let L=0;L<2;L++){g.beginPath();const rad=L?s*1.02:s*.86,col=L?'#5c4327':'#6f5231';
    for(let i=0;i<=22;i++){const a=Math.PI*.15+i/22*Math.PI*1.15,rr=i%2?rad:rad*.78;
      const x=s*.25-Math.cos(a)*rr,y=-Math.sin(a)*rr*.9+s*.15;i?g.lineTo(x,y):g.moveTo(x,y);}g.closePath();g.fillStyle=col;g.fill();}
  sphere(g,-s*.55,s*.18,s*.56,'#f0d6ac','#d9b483');
  g.fillStyle='#e9c79c';g.beginPath();g.arc(-s*.45,-s*.28,s*.16,0,6.2832);g.fill();
  eye(g,-s*.72,s*.02,s*.13,-.5);
  sphere(g,-s*1.02,s*.24,s*.14,'#5a4030','#2e2016');
  g.fillStyle='rgba(255,150,150,.35)';g.beginPath();g.arc(-s*.75,s*.28,s*.12,0,6.2832);g.fill();g.restore();}
function aFrog(g,s,t,atk){const pf=atk?1+Math.sin(atk*8)*.08:1;
  g.fillStyle='#49a23c';g.beginPath();g.ellipse(-s*.7,s*.55,s*.3,s*.18,.5,0,6.2832);g.fill();
  g.beginPath();g.ellipse(s*.7,s*.55,s*.3,s*.18,-.5,0,6.2832);g.fill();
  g.save();g.scale(pf,1/pf*.5+.5);blob(g,0,s*.12,s*.92,s*.8,'#74cf5e','#3f8f34');
  g.beginPath();g.ellipse(0,s*.12,s*.92,s*.8,0,0,6.2832);outline(g,s*.09,OL);
  blob(g,0,s*.4,s*.5,s*.36,'#e2f2b0','#bfe089');g.restore();
  for(const sx of[-.42,.42]){sphere(g,sx*s,-s*.62,s*.3,'#7fd66a','#4a9e3d');eye(g,sx*s,-s*.66,s*.19,0);}
  g.strokeStyle='#2c6b26';g.lineWidth=s*.09;g.lineCap='round';g.beginPath();g.arc(0,s*.02,s*.42,.15,Math.PI-.15);g.stroke();
  if(atk){g.fillStyle='#e0525f';g.beginPath();g.arc(-s*.1,s*.2,s*.1,0,6.2832);g.fill();}}
function aBee(g,s,t){const fl=Math.sin(t*30)*s*.35;
  g.fillStyle='rgba(210,235,255,.6)';g.beginPath();g.ellipse(-s*.1,-s*.5,s*.42,s*.22-Math.abs(fl)*.1,.4,0,6.2832);g.fill();
  g.beginPath();g.ellipse(s*.3,-s*.5,s*.42,s*.22-Math.abs(fl)*.1,-.4,0,6.2832);g.fill();

const MAX_PRODUCERS=7;
function producerCount(){let n=0;for(const d of G.defenders)if(d.alive&&d.role==='producer')n++;return n;}
function defenderCost(id){ return DEFENDERS[id].cost; }   // flat cost, no ramp
function producerFactor(){ return 1; }                    // flat yield, no diminishing

function place(id,c,r){const t=DEFENDERS[id];
  G.defenders.push({...t,type:id,c,r,alive:true,hp:t.hp,maxHp:t.hp,px:cellCX(c),py:cellCY(r),
    anim:Math.random()*6,fireT:Math.random()*.4,prodT:0,atk:0,hurt:0,pop:1.3,synD:1,synP:1,syn:false});}
function enemyScale(){return 1+(G.level-1)*0.08;}
function spawn(id,row){const t=ENEMIES[id];const hp=Math.round(t.hp*enemyScale());
  G.enemies.push({...t,type:id,row,alive:true,hp,maxHp:hp,x:cellCX(COLS)+cell*.4,y:cellCY(row)+(t.air?-cell*.18:0),
    baseY:cellCY(row),leg:Math.random()*6,hurt:0,shift:0,eat:null});}
function shoot(d,tg){G.projectiles.push({x:d.px,y:d.py-cell*.15,target:tg,dmg:d.dmg*d.synD,speed:560,
    kind:d.proj,splash:d.splash||0,pierce:d.pierce,bonus:d.bonus||0,air:d.air,alive:true});}
function burst(x,y,c,n,sp=1){for(let i=0;i<n;i++){const a=Math.random()*6.28,v=(40+Math.random()*120)*sp;
  G.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-50,life:.5+Math.random()*.5,t:0,col:c,r:2+Math.random()*3.5,grav:220});}}
function leafBurst(x,y){const cs=['#7cc35a','#5aa03e','#ffd94a','#ff8fb1'];
  for(let i=0;i<10;i++){const a=Math.random()*6.28,v=50+Math.random()*130;
    G.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-70,life:.6+Math.random()*.5,t:0,col:cs[i%4],r:3+Math.random()*3,grav:180,leaf:true,rot:Math.random()*6,vr:(Math.random()-.5)*10});}}
function floatText(x,y,txt,col){G.floats.push({x,y,txt,col,t:0,life:1});}
function ringFx(x,y,col,r0){G.particles.push({x,y,vx:0,vy:0,life:.32,t:0,col,r:r0||6,grav:0,ring:true});}
function muzzle(x,y){for(let i=0;i<4;i++){const a=Math.random()*6.28,v=30+Math.random()*40;
  G.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:.25,t:0,col:'#fff6c0',r:2+Math.random()*2,grav:40});}}

function recomputeSynergy(){
  for(const d of G.defenders){d.synD=1;d.synP=1;d.syn=false;}
  for(const d of G.defenders)for(const o of G.defenders){
    if(d===o||Math.abs(d.c-o.c)+Math.abs(d.r-o.r)!==1)continue;
    for(const s of SYNERGIES)if((d.type===s.a&&o.type===s.b)||(d.type===s.b&&o.type===s.a)){
      if(s.dmg){d.synD=Math.max(d.synD,s.dmg);} if(s.prod){d.synP=Math.max(d.synP,s.prod);} d.syn=true;}}
}

/* ==========================================================================
   LEVEL BUILDING  (endless-scaling but finite per level → win when cleared)
   ========================================================================== */
function enemyPool(n){const p=['ant','ant'];
  if(n>=2)p.push('caterpillar'); if(n>=3)p.push('fly'); if(n>=4)p.push('beetle','ant');
  if(n>=6)p.push('moth'); if(n>=8)p.push('wasp'); if(n>=5)p.push('caterpillar');
  return p;}
function pick(a){return a[(Math.random()*a.length)|0];}
function buildLevel(n){
  // Slower, measured pacing (~2.5min early -> ~5min late). Gaps are seconds
  // between spawns; clear breathers between waves give time to plan.
  const q=[]; let est=0; const add=(id,gap)=>{q.push({id,gap});est+=gap;};
  const pool=enemyPool(n);
  const target=Math.min(300,150+n*3);           // spawn-schedule length in seconds
  const restGap=Math.max(3,5-n*0.015);          // breather before each wave
  const inGap=Math.max(.85,1.6-n*0.006);        // gap within a wave
  const finGap=Math.max(.5,.9-n*0.004);         // final-rush gap
  const finSize=6+Math.floor(n/2);
  const reserve=finSize*finGap+7;               // room for final rush + boss
  let c=0;
  while(est<target-reserve && c<60){
    const size=3+Math.floor(n/4)+(c%2);
    add(pick(pool),restGap);                     // wave breather
    for(let i=1;i<size;i++) add(pick(pool),inGap);
    if(n>=8 && c>0 && c%3===0) add('spider',restGap);
    c++;
  }
  // final rush
  add(pick(pool),restGap);
  for(let i=1;i<finSize;i++) add(pick(pool),finGap);
  if(n%10===0) add('queen',3);
  else if(n>=8 && n%5===0) add('spider',3);
  return q;
}

/* ==========================================================================
   UPDATE
   ========================================================================== */
function update(dt){
  if(G.phase!=='play') return;
  dt*=G.speed; G.time+=dt;
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*3);

  // prep countdown before spawning
  if(!G.spawning){ G.prepT-=dt; if(G.prepT<=0){ G.spawning=true; } }

  // gentle ambient sun (middle-ground so early game flows without free-money spam)
  G.ambientT+=dt; if(G.ambientT>=5){ G.ambientT=0; G.sun+=12; syncHUD(); }

  // spawn
  if(G.spawning && G.spawnQueue.length){
    G.spawnT+=dt;
    if(G.spawnT>=G.spawnQueue[0].gap){ G.spawnT=0; const it=G.spawnQueue.shift();
      const t=ENEMIES[it.id]; spawn(it.id,(Math.random()*ROWS)|0); }
  }

  // defenders
  for(const d of G.defenders){
    if(!d.alive)continue;
    d.anim+=dt; if(d.pop>1)d.pop=Math.max(1,d.pop-dt*3); if(d.hurt>0)d.hurt-=dt*3; if(d.atk>0)d.atk=Math.max(0,d.atk-dt*3);
    if(d.role==='producer'){ d.prodT+=dt; if(d.prodT>=d.every){d.prodT=0;const a=Math.max(1,Math.round(d.produce*d.synP*producerFactor()));
      G.sun+=a;floatText(d.px,d.py-cell*.4,'+'+a,'#ffd94a');burst(d.px,d.py-cell*.3,'#ffe27a',8);syncHUD();} continue; }
    d.fireT+=dt; const tg=findTarget(d);
    if(tg && d.fireT>=1/d.rate){ d.fireT=0; d.atk=1;
      if(d.proj){ shoot(d,tg); muzzle(d.px,d.py-cell*.15); }
      else { hitEnemy(tg,d.dmg*d.synD); if(d.splash)splashDamage(tg.x,tg.y,d.splash*cell,d.dmg*d.synD*.6,d.air,tg);
        burst(tg.x,tg.y,'#ffcaa8',6); ringFx(tg.x,tg.y,'#ffd9a8',d.splash?d.splash*cell:8); }
    }
  }

  // projectiles
  for(const p of G.projectiles){
    if(!p.alive)continue; const t=p.target;
    if(!t||!t.alive){p.alive=false;continue;}
    const dx=t.x-p.x,dy=t.y-p.y,dist=Math.hypot(dx,dy);
    if(dist<14){ const killed=hitEnemy(t,p.dmg,p.bonus);
      if(p.splash)splashDamage(t.x,t.y,p.splash*cell,p.dmg*.6,p.air,t);
      if(!p.pierce)p.alive=false; burst(t.x,t.y,p.kind==='tongue'?'#e0525f':'#cfe86a',6);
      ringFx(t.x,t.y,'#eaff8a',p.splash?p.splash*cell:9);
    } else { p.x+=dx/dist*p.speed*dt; p.y+=dy/dist*p.speed*dt; }
  }

  // enemies
  for(const e of G.enemies){
    if(!e.alive)continue;
    e.leg+=dt*10; if(e.hurt>0)e.hurt-=dt*4;
    let sp=e.speed*ENEMY_SPEED*cell*dt;
    e.shift*=(1-dt*2);
    const blk=frontDefender(e);
    if(blk){ blk.hp-=e.bite*dt; blk.hurt=1; if(blk.hp<=0){blk.alive=false;leafBurst(blk.px,blk.py);recomputeSynergy();} }
    else e.x-=sp;
    e.y=e.baseY+(e.air?-cell*.18+Math.sin(e.leg*.5)*cell*.05:0)+e.shift;
    if(e.x<boardX-cell*.25){ e.alive=false; loseHp(e.dmg); G.shake=Math.min(1,G.shake+.4); burst(boardX,e.y,'#ff6b6b',12); }
  }

  for(const p of G.particles){p.t+=dt;p.vy+=p.grav*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.leaf)p.rot+=p.vr*dt;}
  for(const f of G.floats){f.t+=dt;f.y-=30*dt;}
  G.enemies=G.enemies.filter(e=>e.alive);
  G.projectiles=G.projectiles.filter(p=>p.alive);
  G.defenders=G.defenders.filter(d=>d.alive);
  G.particles=G.particles.filter(p=>p.t<p.life);
  G.floats=G.floats.filter(f=>f.t<f.life);

  updateProgress();
  // level cleared?
  if(G.spawning && G.spawnQueue.length===0 && G.enemies.length===0){ winLevel(); }
}

function frontDefender(e){
  if(e.air) return null;   // flyers pass over everything
  let best=null,bx=-1;
  for(const d of G.defenders){
    if(!d.alive||d.r!==e.row)continue;
    if(d.px<=e.x && d.px>bx && (e.x-d.px)<cell*.55){bx=d.px;best=d;}
  }
  return best;
}
function findTarget(d){
  let best=null,bx=1e9;
  for(const e of G.enemies){ if(!e.alive)continue; if(e.air&&!d.air)continue;
    const dist=Math.hypot(e.x-d.px,e.y-d.py)/cell;
    if(dist<=d.range && e.x<bx){bx=e.x;best=e;} }
  return best;
}
function hitEnemy(e,dmg,bonus){
  const d=e.armor?dmg*(1-e.armor):dmg; e.hp-=d; e.hurt=1;
  if(e.hp<=0){ e.alive=false; const rw=e.reward+(bonus||0); G.sun+=rw;
    floatText(e.x,e.y-cell*.3,'+'+rw,'#ffe27a'); leafBurst(e.x,e.y);
    if(e.boss){G.shake=.6;toast('הבוס הובס! 🎉');} syncHUD(); return true; }
  return false;
}
function splashDamage(x,y,r,dmg,air,except){
  for(const e of G.enemies){ if(!e.alive||e===except)continue; if(e.air&&!air)continue;
    if(Math.hypot(e.x-x,e.y-y)<=r) hitEnemy(e,dmg); }
}
function loseHp(n){G.hp=Math.max(0,G.hp-n);syncHUD();if(G.hp<=0)loseLevel();}

/* ==========================================================================
   RENDER
   ========================================================================== */
function draw(){
  ctx.clearRect(0,0,viewW,viewH);
  ctx.save();
  if(G.shake>0)ctx.translate((Math.random()-.5)*G.shake*10,(Math.random()-.5)*G.shake*10);
  drawScene();

  if((G.selected||G.sellMode) && hover && G.phase==='play'){
    const x=boardX+hover.c*cell,y=boardY+hover.r*cell, occ=defAt(hover.c,hover.r);
    let ok;
    if(G.sellMode) ok=!!occ;
    else{const pOK=DEFENDERS[G.selected].role!=='producer'||producerCount()<MAX_PRODUCERS;
      ok=!occ && pOK && G.sun>=defenderCost(G.selected);}
    ctx.fillStyle=ok?(G.sellMode?'rgba(255,120,80,.3)':'rgba(255,255,255,.22)'):'rgba(255,70,70,.28)';
    roundRect(x+3,y+3,cell-6,cell-6,10);ctx.fill();
    ctx.strokeStyle=ok?(G.sellMode?'#ff8f5b':'rgba(255,255,255,.6)'):'rgba(255,90,90,.7)';ctx.lineWidth=2.5;
    roundRect(x+3,y+3,cell-6,cell-6,10);ctx.stroke();
    if(ok&&!G.sellMode){ctx.globalAlpha=.5;drawCreature(ctx,DEF_ART[G.selected],cellCX(hover.c),cellCY(hover.r),cell*.4,G.time,0);ctx.globalAlpha=1;}
  }

  ctx.lineCap='round';
  for(const d of G.defenders){ if(!d.syn)continue; for(const o of G.defenders){ if(o===d||!o.syn)continue;
    if(Math.abs(d.c-o.c)+Math.abs(d.r-o.r)!==1)continue; const pu=.5+Math.sin(G.time*4)*.3;
    ctx.strokeStyle=`rgba(120,230,255,${pu})`;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(d.px,d.py);ctx.lineTo(o.px,o.py);ctx.stroke(); } }

  const list=[...G.defenders.map(d=>({y:d.py,f:()=>drawDefender(d)})),...G.enemies.map(e=>({y:e.y,f:()=>drawEnemy(e)}))].sort((a,b)=>a.y-b.y);
  list.forEach(o=>o.f());
  G.projectiles.forEach(drawProj); G.particles.forEach(drawParticle);
  ctx.restore();

  for(const f of G.floats){const a=1-f.t/f.life;ctx.globalAlpha=Math.max(0,a);ctx.fillStyle=f.col;
    ctx.font='bold 16px Varela Round,sans-serif';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);ctx.globalAlpha=1;ctx.textAlign='left';}

  // prep countdown text
  if(!G.spawning && G.phase==='play' && G.prepT>0){
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.font='bold 40px Varela Round,sans-serif';ctx.textAlign='center';
    ctx.fillText(Math.ceil(G.prepT),viewW/2,viewH*.4);
    ctx.font='bold 16px Varela Round,sans-serif';ctx.fillText('התכוננו!',viewW/2,viewH*.4+30);ctx.textAlign='left';
  }
}

const BIOMES=[{g1:'#8ed24f',g2:'#5ba832',dirt:'#cda06a'},{g1:'#74c9a2',g2:'#3f9f74',dirt:'#bda06a'},
  {g1:'#b6cc62',g2:'#82a23e',dirt:'#d0b47a'},{g1:'#7fa0c0',g2:'#4d7396',dirt:'#a6b48c'}];
let flowers=[];
const scene={clouds:[],hills:[],bushes:[],tufts:[],birds:[]};
function seedScene(){
  scene.clouds=[{x:.18,y:.05,s:1},{x:.66,y:.10,s:.8},{x:.42,y:.03,s:.6},{x:.85,y:.07,s:.5}];
  scene.bushes=[];for(let i=0;i<9;i++)scene.bushes.push({x:i/8+(Math.random()-.5)*.06,s:.85+Math.random()*.7,k:i%3});
  scene.tufts=[];for(let i=0;i<95;i++)scene.tufts.push({x:Math.random(),y:Math.random(),s:.5+Math.random()*1.0,f:Math.random()<.1,v:Math.random()});
  scene.birds=[{x:.25,y:.14,ph:0},{x:.4,y:.11,ph:1.5}];
}
function drawScene(){
  const b=BIOMES[G.biome];
  // ---- sky ----
  const horizon=boardY-6;
  const sky=ctx.createLinearGradient(0,0,0,viewH);
  const skyTop=shade(b.g1,1.18);
  sky.addColorStop(0,skyTop);sky.addColorStop(Math.max(.05,horizon/viewH*.75),shade(b.g1,1.06));sky.addColorStop(1,shade(b.g2,.82));
  ctx.fillStyle=sky;ctx.fillRect(0,0,viewW,viewH);
  // ---- sun ----
  drawSunMoon(horizon);
  // ---- clouds (slow drift) ----
  ctx.globalAlpha=.9;for(const c of scene.clouds){const cx=(((c.x+G.time*0.004)%1.15)-.075)*viewW;drawCloud(cx,c.y*horizon+20,c.s*(cell*.5));}ctx.globalAlpha=1;
  // ---- distant hills behind the bed ----
  drawHills(b,horizon);
  // ---- soft ground shadow under the bed ----
  ctx.fillStyle='rgba(0,0,0,.2)';roundRect(boardX-10,boardY+8,boardW+20,boardH+14,20);ctx.fill();
  // ---- lush mowed lawn: alternating green stripes (PvZ style, no dirt) ----
  for(let r=0;r<ROWS;r++){const y=boardY+r*cell;const lite=r%2===0;
    const g=ctx.createLinearGradient(0,y,0,y+cell);
    g.addColorStop(0,shade(b.g1,lite?1.08:0.99));g.addColorStop(1,shade(b.g2,lite?1.06:0.95));
    ctx.fillStyle=g;ctx.fillRect(boardX,y,boardW,cell);
    // soft stripe seam highlight for a manicured look
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(boardX,y,boardW,2);}
  // fake-iso depth shading: top of the lawn cooler/darker, front warmer/brighter
  const dep=ctx.createLinearGradient(0,boardY,0,boardY+boardH);
  dep.addColorStop(0,'rgba(16,30,8,.26)');dep.addColorStop(.5,'rgba(0,0,0,0)');dep.addColorStop(1,'rgba(255,244,190,.12)');
  ctx.fillStyle=dep;ctx.fillRect(boardX,boardY,boardW,boardH);
  // grass tufts + tiny flowers texture
  drawTufts(b);
  ctx.strokeStyle='rgba(20,45,15,.1)';ctx.lineWidth=1;
  for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(boardX+c*cell,boardY);ctx.lineTo(boardX+c*cell,boardY+boardH);ctx.stroke();}
  for(const f of flowers)drawDeco(f);
  drawHome();drawPortal();
  // ---- wooden raised-bed frame ----
  drawPlanter();
  // ---- foreground bushes filling the bottom ----
  drawForeground(b);
  // ---- ambient pollen motes for life ----
  drawMotes();
  // ---- vignette ----
  const vg=ctx.createRadialGradient(viewW/2,viewH*.45,viewH*.3,viewW/2,viewH*.5,viewH*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');ctx.fillStyle=vg;ctx.fillRect(0,0,viewW,viewH);
}
function drawSunMoon(horizon){
  const x=viewW*.8,y=horizon*.34;
  // rotating rays
  ctx.save();ctx.translate(x,y);ctx.rotate(G.time*0.15);ctx.fillStyle='rgba(255,238,150,.18)';
  for(let i=0;i<12;i++){ctx.rotate(6.2832/12);ctx.beginPath();ctx.moveTo(cell*.45,-cell*.12);ctx.lineTo(cell*1.6,0);ctx.lineTo(cell*.45,cell*.12);ctx.closePath();ctx.fill();}
  ctx.restore();
  const g=ctx.createRadialGradient(x,y,2,x,y,cell*1.7);g.addColorStop(0,'rgba(255,244,180,.85)');g.addColorStop(.5,'rgba(255,230,140,.35)');g.addColorStop(1,'rgba(255,230,140,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,cell*1.7,0,6.28);ctx.fill();
  ctx.fillStyle='#fff2b0';ctx.beginPath();ctx.arc(x,y,cell*.36,0,6.28);ctx.fill();
}
function drawMotes(){
  const n=14;ctx.fillStyle='rgba(255,250,190,.5)';
  for(let i=0;i<n;i++){const t=G.time*.12+i*1.7;
    const x=((i/n+Math.sin(t)*.06+t*.02)%1)*viewW;
    const y=boardY-cell + (Math.sin(t*1.3+i)*.5+.5)*(boardH+cell*1.4);
    const a=.25+.25*Math.sin(t*2+i);ctx.globalAlpha=Math.max(0,a);
    ctx.beginPath();ctx.arc(x,y,1.6+Math.sin(t+i)*.8,0,6.28);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath();ctx.ellipse(x,y,s*1.1,s*.6,0,0,6.28);ctx.ellipse(x-s*.7,y+s*.15,s*.7,s*.45,0,0,6.28);
  ctx.ellipse(x+s*.7,y+s*.12,s*.75,s*.5,0,0,6.28);ctx.ellipse(x+s*.1,y-s*.3,s*.6,s*.5,0,0,6.28);ctx.fill();}
function drawHills(b,horizon){
  for(let L=0;L<2;L++){const yBase=horizon-6+L*8, amp=cell*(L?.5:.8), col=L?shade(b.g2,.9):shade(b.g2,.78);
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(-10,yBase+amp);
    for(let x=-10;x<=viewW+10;x+=viewW/4){ctx.quadraticCurveTo(x+viewW/8,yBase-amp*(L?.5:1),x+viewW/4,yBase);}
    ctx.lineTo(viewW+10,horizon+40);ctx.lineTo(-10,horizon+40);ctx.closePath();ctx.fill();}
}
function drawTufts(b){
  ctx.lineCap='round';
  for(const t of scene.tufts){const x=boardX+t.x*boardW,y=boardY+t.y*boardH;
    if(t.f){ctx.fillStyle=['#ff8fb1','#ffd94a','#fff0f5','#c98fff'][(t.x*100|0)%4];ctx.beginPath();ctx.arc(x,y,2.2*t.s,0,6.28);ctx.fill();continue;}
    // grass blade cluster with slight color variation for lushness
    ctx.strokeStyle=shade(b.g1,.62+t.v*.22);ctx.lineWidth=1.3+t.s*.4;const h=(4+t.v*4)*t.s;
    ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x-2.5,y-h*.7,x-3.5,y-h);
    ctx.moveTo(x,y);ctx.lineTo(x-.5,y-h*1.15);
    ctx.moveTo(x,y);ctx.quadraticCurveTo(x+2.5,y-h*.7,x+3.5,y-h);ctx.stroke();}
}
function drawPlanter(){
  const t=Math.max(6,cell*.14), x=boardX-t, y=boardY-t, w=boardW+t*2, h=boardH+t*2;
  ctx.save();
  // wooden frame ONLY (even-odd leaves the lawn showing through the middle)
  const wood=ctx.createLinearGradient(0,y,0,y+h);wood.addColorStop(0,'#b98a54');wood.addColorStop(1,'#8a5f34');
  ctx.fillStyle=wood;ctx.beginPath();rrPath(x,y,w,h,t*1.1);rrPath(boardX,boardY,boardW,boardH,10);ctx.fill('evenodd');
  // top highlight + plank lines
  ctx.strokeStyle='rgba(255,240,200,.35)';ctx.lineWidth=2;roundRect(x+2,y+2,w-4,h-4,t);ctx.stroke();
  ctx.strokeStyle='rgba(80,50,20,.4)';ctx.lineWidth=1.5;
  for(let px=x+t*1.4;px<x+w-t;px+=t*1.4){ctx.beginPath();ctx.moveTo(px,y+2);ctx.lineTo(px,y+t-2);ctx.moveTo(px,y+h-t+2);ctx.lineTo(px,y+h-2);ctx.stroke();}
  // corner posts
  ctx.fillStyle='#9c6f3f';for(const cx of[x,x+w-t*1.3])for(const cy of[y,y+h-t*1.3]){roundRect(cx,cy,t*1.3,t*1.3,3);ctx.fill();
    ctx.fillStyle='rgba(255,240,200,.3)';roundRect(cx+2,cy+2,t*1.3-4,t*.4,2);ctx.fill();ctx.fillStyle='#9c6f3f';}
  ctx.restore();
  // inner shadow of the bed
  ctx.strokeStyle='rgba(30,45,20,.28)';ctx.lineWidth=4;roundRect(boardX+1,boardY+1,boardW-2,boardH-2,10);ctx.stroke();
}
function drawForeground(b){
  const baseY=boardY+boardH+Math.max(6,cell*.18);
  for(const bu of scene.bushes){const x=bu.x*viewW,s=cell*bu.s;
    const col=[shade(b.g2,.7),shade(b.g1,.72),shade(b.g2,.6)][bu.k];
    ctx.fillStyle=col;ctx.beginPath();
    ctx.arc(x-s*.5,baseY,s*.55,0,6.28);ctx.arc(x,baseY-s*.3,s*.62,0,6.28);ctx.arc(x+s*.55,baseY,s*.5,0,6.28);ctx.fill();
    // little berries/flowers
    if(bu.k===1){ctx.fillStyle='#ffd94a';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(x-s*.3+i*s*.3,baseY-s*.25,2.5,0,6.28);ctx.fill();}}}
  // grass blade fringe along the front
  ctx.strokeStyle=shade(b.g2,.68);ctx.lineWidth=2;ctx.lineCap='round';
  for(let x=0;x<viewW;x+=7){const h=8+((x*7)%11);ctx.beginPath();ctx.moveTo(x,baseY+2);ctx.quadraticCurveTo(x+2,baseY-h*.6,x+((x/13|0)%2?3:-3),baseY-h);ctx.stroke();}
}
function drawDeco(f){const x=boardX+f.x*boardW,y=boardY+f.y*boardH,r=f.r;
  if(f.k==='pebble'){
    ctx.fillStyle='rgba(0,0,0,.14)';ctx.beginPath();ctx.ellipse(x,y+r*.55,r*1.2,r*.5,0,0,6.28);ctx.fill();
    const g=ctx.createLinearGradient(x,y-r,x,y+r);g.addColorStop(0,'#cfcfc4');g.addColorStop(1,'#8f8f83');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,r*1.2,r*.85,f.rot,0,6.28);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.ellipse(x-r*.3,y-r*.3,r*.4,r*.22,f.rot,0,6.28);ctx.fill();return;}
  if(f.k==='mushroom'){
    ctx.fillStyle='rgba(0,0,0,.14)';ctx.beginPath();ctx.ellipse(x,y+r*.7,r*.95,r*.35,0,0,6.28);ctx.fill();
    ctx.fillStyle='#f5ecd8';ctx.beginPath();ctx.ellipse(x,y+r*.4,r*.32,r*.55,0,0,6.28);ctx.fill();
    const cap=ctx.createLinearGradient(x,y-r,x,y);cap.addColorStop(0,'#ff655a');cap.addColorStop(1,'#d5352f');
    ctx.fillStyle=cap;ctx.beginPath();ctx.ellipse(x,y-r*.05,r*1.15,r*.85,0,Math.PI,0,true);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)';for(const d of[[-.45,-.25],[.3,-.4],[.55,-.05],[-.05,-.5]]){ctx.beginPath();ctx.arc(x+d[0]*r,y-r*.05+d[1]*r,r*.15,0,6.28);ctx.fill();}return;}
  if(f.k==='clover'){
    ctx.strokeStyle='#3a8a30';ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(x,y+r*.2);ctx.lineTo(x,y+r*1.3);ctx.stroke();
    ctx.fillStyle='#54b642';for(let i=0;i<3;i++){const a=i/3*6.28+f.rot-1.57;ctx.beginPath();ctx.arc(x+Math.cos(a)*r*.5,y+Math.sin(a)*r*.5,r*.5,0,6.28);ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(x-r*.2,y-r*.2,r*.2,0,6.28);ctx.fill();return;}
  // flower: stem + back petals + front petals + seeded center
  ctx.strokeStyle='#3f9030';ctx.lineWidth=1.8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-2,y+r*1.5);ctx.stroke();
  ctx.fillStyle=shade(f.c,.78);for(let i=0;i<6;i++){const a=i/6*6.28+f.rot+.28;ctx.beginPath();ctx.ellipse(x+Math.cos(a)*r*.95,y+Math.sin(a)*r*.95,r*.6,r*.38,a,0,6.28);ctx.fill();}
  ctx.fillStyle=f.c;for(let i=0;i<6;i++){const a=i/6*6.28+f.rot;ctx.beginPath();ctx.ellipse(x+Math.cos(a)*r,y+Math.sin(a)*r,r*.64,r*.4,a,0,6.28);ctx.fill();}
  ctx.fillStyle='#ffd23f';ctx.beginPath();ctx.arc(x,y,r*.5,0,6.28);ctx.fill();
  ctx.fillStyle='#d99400';for(let i=0;i<6;i++){const a=i/6*6.28+f.rot;ctx.beginPath();ctx.arc(x+Math.cos(a)*r*.22,y+Math.sin(a)*r*.22,r*.08,0,6.28);ctx.fill();}}
function drawHome(){const x=boardX-2,cy=boardY+boardH/2;
  const g=ctx.createRadialGradient(x-6,cy,4,x-6,cy,cell*1.2);g.addColorStop(0,'rgba(255,220,120,.35)');g.addColorStop(1,'rgba(255,220,120,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x-6,cy,cell*1.2,0,6.28);ctx.fill();
  for(let r=0;r<ROWS;r++){const y=boardY+r*cell+cell*.5;ctx.fillStyle='#b6884f';ctx.fillRect(x-9,y-cell*.28,7,cell*.56);ctx.fillStyle='#9c7038';ctx.fillRect(x-9,y-cell*.28,7,4);}
  ctx.save();ctx.translate(x-16,cy);ctx.strokeStyle='#3f8f34';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,cell*.5);ctx.lineTo(0,0);ctx.stroke();
  ctx.fillStyle='#ffb52e';for(let i=0;i<12;i++){const a=i/12*6.28;ctx.beginPath();ctx.ellipse(Math.cos(a)*13,Math.sin(a)*13-8,7,4,a,0,6.28);ctx.fill();}
  ctx.fillStyle='#6b3f1a';ctx.beginPath();ctx.arc(0,-8,9,0,6.28);ctx.fill();ctx.restore();}
function drawPortal(){const x=boardX+boardW+2,cy=boardY+boardH/2;ctx.save();ctx.translate(x,cy);
  const g=ctx.createRadialGradient(0,0,4,0,0,cell*.8);g.addColorStop(0,'rgba(90,40,60,.5)');g.addColorStop(1,'rgba(90,40,60,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(6,0,cell*.8,0,6.28);ctx.fill();ctx.restore();}

function drawCreature(g,art,px,py,s,t,atk,pop=1,hurt=0){
  g.save();g.translate(px,py);
  // soft contact shadow on the ground
  g.fillStyle='rgba(0,0,0,.22)';g.beginPath();g.ellipse(0,s*.85,s*.88,s*.3,0,0,6.28);g.fill();
  const sq=pop>1?pop:1;g.scale(sq,1/(sq*.5+.5));
  const br=1+Math.sin(t*2)*.03;g.scale(br,1/(br*.4+.6));
  // soft dark halo => creatures pop off the grass (premium sticker look)
  g.shadowColor='rgba(18,28,12,.55)';g.shadowBlur=s*.3;g.shadowOffsetY=s*.06;
  art(g,s,t,atk);
  g.shadowColor='transparent';g.shadowBlur=0;g.shadowOffsetY=0;
  if(hurt>0){g.globalAlpha=Math.min(.5,hurt*.5);g.fillStyle='#fff';g.beginPath();g.ellipse(0,0,s*.92,s*.82,0,0,6.28);g.fill();g.globalAlpha=1;}
  g.restore();
}
function drawDefender(d){
  drawCreature(ctx,DEF_ART[d.type],d.px,d.py-cell*.08,cell*.4,d.anim,d.atk,d.pop,d.hurt);
  if(d.hp<d.maxHp)hpBar(d.px,d.py-cell*.62,cell*.6,d.hp/d.maxHp,'#8fe04a');
  if(d.syn){ctx.fillStyle='#7ce8ff';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('✦',d.px,d.py-cell*.72);ctx.textAlign='left';}
}
function drawEnemy(e){const s=e.size*(cell/60);
  drawCreature(ctx,ENE_ART[e.type],e.x,e.y,s*1.1,e.leg*.3+e.x*.02,0,1,e.hurt);
  if(e.hp<e.maxHp)hpBar(e.x,e.y-s*1.5,s*1.8,e.hp/e.maxHp,e.boss?'#ff9f4a':e.mini?'#ffd24a':'#ff5b6e');}
function hpBar(x,y,w,fr,col){ctx.fillStyle='rgba(0,0,0,.45)';roundRect(x-w/2,y,w,5,2.5);ctx.fill();ctx.fillStyle=col;roundRect(x-w/2,y,w*Math.max(0,fr),5,2.5);ctx.fill();}
function drawProj(p){
  // glow
  ctx.save();ctx.shadowColor=({tongue:'#ff8f9a',acorn:'#c98a4a',coin:'#ffe27a',dart:'#ff9a5a',feather:'#e8d0a0',sting:'#fff0a0'}[p.kind])||'#eaff8a';ctx.shadowBlur=8;
  if(p.kind==='tongue'){ctx.fillStyle='#e0525f';ctx.beginPath();ctx.arc(p.x,p.y,5,0,6.28);ctx.fill();}
  else if(p.kind==='acorn'){ctx.fillStyle='#8a5a2a';ctx.beginPath();ctx.arc(p.x,p.y,5,0,6.28);ctx.fill();ctx.fillStyle='#5a3a18';ctx.fillRect(p.x-4,p.y-6,8,3);}
  else if(p.kind==='coin'){ctx.fillStyle='#ffd24a';ctx.beginPath();ctx.arc(p.x,p.y,5,0,6.28);ctx.fill();ctx.strokeStyle='#b8860b';ctx.lineWidth=1.5;ctx.stroke();}
  else if(p.kind==='dart'){ctx.strokeStyle='#e0692a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+9,p.y);ctx.stroke();}
  else if(p.kind==='feather'){ctx.fillStyle='#c9a877';ctx.beginPath();ctx.ellipse(p.x,p.y,6,3,0,0,6.28);ctx.fill();}
  else if(p.kind==='sting'){ctx.fillStyle='#ffce4a';ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,6.28);ctx.fill();}
  else{ctx.fillStyle='#d9e86a';ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,6.28);ctx.fill();}
  ctx.restore();}
function drawParticle(p){const a=1-p.t/p.life;ctx.globalAlpha=Math.max(0,a);
  if(p.ring){const rr=p.r+(p.t/p.life)*p.r*1.8;ctx.strokeStyle=p.col;ctx.lineWidth=2.5*a+.5;ctx.beginPath();ctx.arc(p.x,p.y,rr,0,6.28);ctx.stroke();}
  else if(p.leaf){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.5,0,0,6.28);ctx.fill();ctx.restore();}
  else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();}ctx.globalAlpha=1;}
function rrPath(x,y,w,h,r){ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function roundRect(x,y,w,h,r){ctx.beginPath();rrPath(x,y,w,h,r);}
function shade(hex,f){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,r*f)|0;g=Math.min(255,g*f)|0;b=Math.min(255,b*f)|0;return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

function loop(ts){const dt=Math.min(.05,(ts-last)/1000||0);last=ts;update(dt);draw();requestAnimationFrame(loop);}

let hover=null;
const toastEl=document.getElementById('toast');let toastTimer;
function toast(m){toastEl.textContent=m;toastEl.style.opacity=1;clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.style.opacity=0,1600);}
function updateProgress(){
  const remain=G.spawnQueue.length+G.enemies.length;
  const done=Math.max(0,G.levelTotal-remain);
  const fr=G.levelTotal?done/G.levelTotal:0;
  document.getElementById('progFill').style.width=(fr*100).toFixed(1)+'%';
}
function syncHUD(){
  document.getElementById('sunN').textContent=Math.floor(G.sun);
  document.getElementById('lvlN').textContent=G.level;
  const h=document.getElementById('hearts');
  if(h.children.length!==G.maxHp){h.innerHTML='';for(let i=0;i<G.maxHp;i++){const s=document.createElement('span');s.className='heart';s.textContent='❤️';h.appendChild(s);}}
  [...h.children].forEach((el,i)=>el.classList.toggle('gone',i>=G.hp));
  document.querySelectorAll('.card').forEach(c=>{const id=c.dataset.id,cost=defenderCost(id);
    const co=c.querySelector('.co');if(co)co.innerHTML='☀️'+cost;
    const capped=DEFENDERS[id].role==='producer'&&producerCount()>=MAX_PRODUCERS;
    c.classList.toggle('poor',G.sun<cost||capped);});
}
function buildBar(){
  const bar=document.getElementById('bar');bar.innerHTML='';
  // desktop: let the mouse wheel scroll the card bar horizontally
  bar.onwheel=e=>{if(e.deltaY){bar.scrollLeft+=e.deltaY;e.preventDefault();}};
  const sh=document.createElement('div');sh.id='shovel';sh.innerHTML='<span class="em">🧤</span>הוצא';
  sh.addEventListener('click',()=>{G.sellMode=!G.sellMode;sh.classList.toggle('on',G.sellMode);
    if(G.sellMode){G.selected=null;document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));}});
  bar.appendChild(sh);
  for(const id of unlockedDefs(G.level)){const t=DEFENDERS[id];
    const card=document.createElement('div');card.className='card';card.dataset.id=id;
    const cv=document.createElement('canvas');cv.width=92;cv.height=92;card.appendChild(cv);
    const nm=document.createElement('div');nm.className='nm';nm.textContent=t.name;card.appendChild(nm);
    const co=document.createElement('div');co.className='co';co.innerHTML='☀️'+defenderCost(id);card.appendChild(co);
    bar.appendChild(card);portrait(cv,id);
    card.addEventListener('click',()=>selectCard(id,card));}
  syncHUD();
}
function portrait(cv,id){const g=cv.getContext('2d');g.clearRect(0,0,92,92);g.save();g.translate(46,54);drawStatic(g,DEF_ART[id],30);g.restore();}
function drawStatic(g,art,s){g.save();g.fillStyle='rgba(0,0,0,.15)';g.beginPath();g.ellipse(0,s*.85,s*.8,s*.24,0,0,6.28);g.fill();art(g,s,.6,0);g.restore();}
function selectCard(id,card){
  if(G.phase!=='play')return; G.sellMode=false;document.getElementById('shovel').classList.remove('on');
  if(G.selected===id){G.selected=null;card.classList.remove('sel');return;}
  G.selected=id;document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');
}
function getPos(ev){const r=canvas.getBoundingClientRect();const t=ev.touches?ev.touches[0]:ev;return{x:t.clientX-r.left,y:t.clientY-r.top};}
canvas.addEventListener('pointermove',ev=>{hover=pointToCell(getPos(ev).x,getPos(ev).y);});
canvas.addEventListener('pointerleave',()=>hover=null);
canvas.addEventListener('pointerdown',ev=>{
  if(G.phase!=='play')return;const c=pointToCell(getPos(ev).x,getPos(ev).y);if(!c)return;hover=c;
  if(G.sellMode){const d=defAt(c.c,c.r);if(d){const refund=Math.floor(DEFENDERS[d.type].cost*.5);G.sun+=refund;
    d.alive=false;recomputeSynergy();burst(cellCX(c.c),cellCY(c.r),'#ffd24a',10);floatText(cellCX(c.c),cellCY(c.r)-cell*.3,'+'+refund,'#ffd24a');syncHUD();}return;}
  if(G.selected){const t=DEFENDERS[G.selected];const cost=defenderCost(G.selected);
    if(defAt(c.c,c.r)){toast('התא תפוס');return;}
    if(t.role==='producer'&&producerCount()>=MAX_PRODUCERS){toast('הגעת למקסימום מייצרים');return;}
    if(G.sun<cost){toast('אין מספיק שמש ☀️');return;}
    G.sun-=cost;place(G.selected,c.c,c.r);recomputeSynergy();burst(cellCX(c.c),cellCY(c.r),'#fff',10);syncHUD();}
});
document.getElementById('pauseBtn').addEventListener('click',()=>{
  if(G.phase==='play'){G.phase='pause';document.getElementById('pauseBtn').textContent='▶';toast('הופסק');}
  else if(G.phase==='pause'){G.phase='play';document.getElementById('pauseBtn').textContent='⏸';}});
document.getElementById('speedBtn').addEventListener('click',()=>{G.speed=G.speed===1?2:1;document.getElementById('speedBtn').textContent=G.speed+'×';});
document.getElementById('mapBtn').addEventListener('click',()=>{ if(G.phase==='play'||G.phase==='pause'){G.phase='menu';showMap();} });

/* ==========================================================================
   FLOW: menu -> map -> level -> win/lose
   ========================================================================== */
const ov=document.getElementById('ov');
function hideGameUI(v){ for(const id of['hud','prog','ctrl','bar']) document.getElementById(id).style.display=v?'none':''; }

function showMenu(){
  G.phase='menu'; ov.classList.remove('hidden'); hideGameUI(true);
  const p=progress();
  ov.innerHTML=`<h1>🌱 הגן הקטן</h1>
    <div class="panel">
      <div class="sub">הגן על הגינה מפני נחילי החרקים דרך <b>100 שלבים</b>!<br>כל שלב פותח חיה חדשה עד שלב 15. סדר חכם = ניצחון.</div>
      <div class="best">🏆 הגעת לשלב ${p} מתוך ${MAX_LEVEL}</div>
      <button class="btn" id="playBtn">שחק ▶</button>
    </div>`;
  document.getElementById('playBtn').addEventListener('click',showMap);
}
function showMap(){
  G.phase='menu'; ov.classList.remove('hidden'); hideGameUI(true);
  const p=progress();
  ov.innerHTML=`<h1 style="font-size:26px">🗺️ בחר שלב</h1>
    <div id="mapWrap"><div id="mapGrid"></div></div>
    <div class="row"><button class="btn sec" id="backMenu">◀ תפריט</button>
    <button class="btn" id="contBtn">המשך לשלב ${p} ▶</button></div>`;
  const grid=document.getElementById('mapGrid');
  for(let n=1;n<=MAX_LEVEL;n++){
    const d=document.createElement('div');
    const cls=n<p?'done':(n===p?'open':'lock');
    d.className='lvl '+cls; d.textContent=n;
    if(n%10===0){const b=document.createElement('span');b.className='boss';b.textContent='👑';d.appendChild(b);}
    if(n<=p) d.addEventListener('click',()=>startLevel(n));
    grid.appendChild(d);
  }
  document.getElementById('backMenu').addEventListener('click',showMenu);
  document.getElementById('contBtn').addEventListener('click',()=>startLevel(p));
  // scroll current level into view
  setTimeout(()=>{const el=grid.children[Math.max(0,p-3)];if(el)el.scrollIntoView({block:'center'});},30);
}
function startLevel(n){
  Object.assign(G,{phase:'play',level:n,hp:5,maxHp:5,sun:150,speed:1,
    defenders:[],enemies:[],projectiles:[],particles:[],floats:[],selected:null,sellMode:false,
    spawnQueue:buildLevel(n),spawnT:0,prepT:5,spawning:false,
    ambientT:0,time:0,shake:0,biome:Math.min(3,Math.floor((n-1)/8))});
  G.levelTotal=G.spawnQueue.length;
  ov.classList.add('hidden'); hideGameUI(false);
  document.getElementById('pauseBtn').textContent='⏸';document.getElementById('speedBtn').textContent='1×';
  document.getElementById('shovel')?.classList.remove('on');
  buildBar(); updateProgress(); syncHUD();
  document.getElementById('progFlag').textContent=(n%10===0)?'👑':'🚩';
  toast('שלב '+n+' — התכוננו!');
}
function winLevel(){
  const n=G.level; G.phase='over'; saveProgress(n+1);
  const nextUnlock=DEF_UNLOCK[n+1];
  ov.classList.remove('hidden'); hideGameUI(true);
  let unlockHtml='';
  if(nextUnlock && n+1<=MAX_LEVEL){ unlockHtml=`<div class="sub">🎉 נפתחה חיה חדשה: <b>${nextUnlock.map(id=>DEFENDERS[id].name).join(', ')}</b>!</div>
    <div class="legend">`+nextUnlock.map(id=>`<div class="li"><canvas class="uc" data-id="${id}" width="84" height="84"></canvas>${DEFENDERS[id].name}</div>`).join('')+`</div>`; }
  const isEnd=n>=MAX_LEVEL;
  ov.innerHTML=`<h1>${isEnd?'🏆 ניצחת הכל!':'✅ שלב '+n+' הושלם!'}</h1>
    ${isEnd?'<div class="sub">סיימת את כל 100 השלבים! אלוף אמיתי 🌟</div>':unlockHtml}
    <div class="row">${isEnd?'':'<button class="btn" id="nextBtn">שלב '+(n+1)+' ▶</button>'}
    <button class="btn sec" id="mapBtn2">🗺️ מפה</button></div>`;
  ov.querySelectorAll('.uc').forEach(cv=>{const g=cv.getContext('2d');g.save();g.translate(42,50);drawStatic(g,DEF_ART[cv.dataset.id],26);g.restore();});
  if(!isEnd)document.getElementById('nextBtn').addEventListener('click',()=>startLevel(n+1));
  document.getElementById('mapBtn2').addEventListener('click',showMap);
}
function loseLevel(){
  const n=G.level; G.phase='over';
  ov.classList.remove('hidden'); hideGameUI(true);
  ov.innerHTML=`<h1>🥀 הפסדת בשלב ${n}</h1>
    <div class="sub">החרקים פרצו לגינה. נסה סידור אחר של חיות!</div>
    <div class="row"><button class="btn" id="retryBtn">נסה שוב 🔄</button>
    <button class="btn sec" id="mapBtn3">🗺️ מפה</button></div>`;
  document.getElementById('retryBtn').addEventListener('click',()=>startLevel(n));
  document.getElementById('mapBtn3').addEventListener('click',showMap);
}

/* ---------- boot ---------- */
function seedFlowers(){flowers=[];for(let i=0;i<46;i++){const r=Math.random();
  let k='flower';if(r<.16)k='pebble';else if(r<.24)k='mushroom';else if(r<.34)k='clover';
  flowers.push({x:.03+Math.random()*.94,y:.06+Math.random()*.88,r:3+Math.random()*3.5,rot:Math.random()*6,
    c:['#ff6f9c','#ffd94a','#ff8f5b','#c98fff','#ff5b6e','#ffffff','#ff9ec4'][i%7],k});}}
function boot(){resize();seedFlowers();seedScene();hideGameUI(true);showMenu();requestAnimationFrame(loop);}
window.addEventListener('load',boot);
</script>
